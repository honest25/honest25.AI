<!DOCTYPE html>
<html>
<head>
  <title>Honest25-AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
  <h2>🤖 Honest25-AI</h2>

<script src="script.js"></script>
</body>
</html>
